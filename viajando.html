<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark">
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <title>Viajando</title>
  <style>
    :root{--bg:#0a1410;--panel:rgba(5,25,20,.78);--accent:#8bffb0;--accent-2:#46f5c5;--text:#eafff1;--muted:rgba(234,255,241,.75)}*{box-sizing:border-box}html{scrollbar-gutter:stable;background:#08110e}body{margin:0;min-height:100vh;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:var(--text);background:linear-gradient(180deg,#08110e 0%,#0b231b 52%,#114034 53%,#08110e 100%);overflow-x:hidden}.wrap{width:min(1180px,92vw);margin:0 auto;padding:72px 0 24px}.topnav{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:50;display:flex;gap:8px;flex-wrap:wrap;justify-content:center;padding:12px;border-radius:22px;background:rgba(5,25,20,.78);border:1px solid rgba(139,255,176,.18);backdrop-filter:blur(14px);box-shadow:0 12px 40px rgba(0,0,0,.28)}.topnav a{color:var(--text);text-decoration:none;padding:10px 14px;border-radius:14px;border:1px solid rgba(255,255,255,.04);font-weight:700;font-size:.92rem;background:rgba(255,255,255,.03)}.topnav a:hover{background:rgba(139,255,176,.10);border-color:rgba(139,255,176,.18)}.topnav .brand{color:var(--accent)}@media (max-width:768px){.topnav{position:sticky;top:0;left:0;transform:none;width:100%;justify-content:flex-start;flex-wrap:nowrap;overflow-x:auto;border-radius:0;padding:10px 8px}.topnav a{flex:0 0 auto;font-size:.88rem}.wrap{padding:20px 0 24px}}.card{background:var(--panel);border:1px solid rgba(139,255,176,.20);box-shadow:0 0 0 1px rgba(70,245,197,.08),0 20px 70px rgba(0,0,0,.35);backdrop-filter:blur(12px);border-radius:28px}.content{padding:24px}.eyebrow{display:inline-block;padding:6px 12px;border-radius:999px;background:rgba(139,255,176,.10);color:var(--accent);border:1px solid rgba(139,255,176,.24);letter-spacing:.12em;text-transform:uppercase;font-size:0.72rem;margin-bottom:10px}h1{margin:0 0 12px;font-size:clamp(1.8rem,4.5vw,2.6rem);line-height:1.1;letter-spacing:-.02em;text-shadow:0 0 18px rgba(70,245,197,.20)}h2{margin:0 0 10px;font-size:clamp(1.45rem,3.8vw,1.9rem);line-height:1.2}.hero{display:grid;gap:14px;justify-items:start}.hero img{width:min(100%, 640px);display:block;border-radius:22px;border:1px solid rgba(255,255,255,0.10);object-fit:cover;object-position:center}.caption{color:var(--muted);font-size:1rem;line-height:1.6;max-width:760px}.meta{display:flex;gap:12px;flex-wrap:wrap}.pill{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.05);border:1px solid rgba(139,255,176,.18);color:var(--text);font-size:.92rem}.menu-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-top:10px}.menu-item{padding:14px;border-radius:18px;background:rgba(255,255,255,.04);border:1px solid rgba(139,255,176,.14)}.menu-item strong{display:block;margin-bottom:6px;color:var(--accent)}
  </style>
</head>
<body>
    <nav class="topnav" aria-label="Menu principal">
    <a class="brand" href="index.html">Matrix na Praia</a>
    <a href="mapa.html">Mapa</a>
    <a href="jogo.html">Jogo</a>
    <a href="receitas.html">Receitas</a>
    <a href="metas.html">Metas</a>
    <a href="viajando.html">Viajando</a>
  </nav>
  <main class="wrap">
    <section class="card content hero">
      <div class="eyebrow">Viajando</div>
      <h1 class="title">Viajando</h1>
      <div class="meta">
        <span class="pill">📅 04/04/2026</span>
        <span class="pill">✈️ Diário de viagem</span>
      </div>
      
      <style>
        .gallery{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;width:100%}
        @media (max-width:900px){.gallery{grid-template-columns:repeat(2,minmax(0,1fr))}}
        @media (max-width:620px){.gallery{grid-template-columns:1fr}}
        .thumb-btn{all:unset;cursor:pointer;display:block;width:100%}
        .thumb-btn img{width:100%;display:block;border-radius:18px;border:1px solid rgba(255,255,255,0.10);object-fit:cover;object-position:center;aspect-ratio:4/5;transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease}
        .thumb-btn:hover img,.thumb-btn:focus-visible img{transform:scale(1.01);box-shadow:0 14px 40px rgba(0,0,0,.28);border-color:rgba(139,255,176,.32)}
        dialog.photo-modal{border:none;padding:0;background:transparent;max-width:min(96vw, 980px);width:100%}
        dialog.photo-modal::backdrop{background:rgba(0,0,0,.78);backdrop-filter:blur(4px)}
        .modal-frame{position:relative}
        .modal-frame img{display:block;width:100%;max-height:88vh;object-fit:contain;border-radius:18px;border:1px solid rgba(255,255,255,.12);background:#000}
        
      </style>
      <div class="gallery" aria-label="Galeria de fotos">
        <figure style="margin:0;display:grid;gap:8px;">
          <button class="thumb-btn" type="button" data-full="assets/gato.jpg" data-alt="Foto do gato na página Viajando">
            <img src="assets/gato.jpg" alt="Foto do gato na página Viajando" />
          </button>
          <figcaption class="caption">gato na praia</figcaption>
        </figure>
        <figure style="margin:0;display:grid;gap:8px;">
          <button class="thumb-btn" type="button" data-full="assets/praia.jpg" data-alt="Foto da praia enviada para a página Viajando">
            <img src="assets/praia.jpg" alt="Foto da praia enviada para a página Viajando" />
          </button>
          <figcaption class="caption">coisas na praia</figcaption>
        </figure>
        <figure style="margin:0;display:grid;gap:8px;">
          <button class="thumb-btn" type="button" data-full="assets/praia-noite.jpg" data-alt="Foto praia de noite">
            <img src="assets/praia-noite.jpg" alt="Foto praia de noite" />
          </button>
          <figcaption class="caption">praia de noite</figcaption>
        </figure>
      </div>
      <dialog class="photo-modal" id="photoModal" aria-label="Visualização ampliada da foto">
        <div class="modal-frame">
          <button class="close-btn" type="button" id="closeModal">Fechar</button>
          <img id="modalImage" alt="" />
        </div>
      </dialog>

      <script>
        const modal = document.getElementById('photoModal');
        const modalImage = document.getElementById('modalImage');
        document.querySelectorAll('.thumb-btn').forEach((btn) => {
          btn.addEventListener('click', () => {
            modalImage.src = btn.dataset.full;
            modalImage.alt = btn.dataset.alt || '';
            modal.showModal();
          });
        });
        modal.addEventListener('click', () => modal.close());
      </script>
    </section>
  </main>
</body>
</html>
