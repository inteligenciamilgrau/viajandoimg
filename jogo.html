<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <title>Surf Matrix</title>
  <style>
    :root{--bg:#06110f;--panel:rgba(5,25,20,.78);--neon:#8bffb0;--neon-2:#46f5c5;--text:#eafff1;--muted:rgba(234,255,241,.75)}*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:var(--text);background:linear-gradient(180deg,#03100e 0%,#0b2730 56%,#0d4c5b 56%,#07202a 100%);overflow-x:hidden}.wrap{width:min(1180px,92vw);margin:0 auto;padding:92px 0 48px}.topnav{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:50;display:flex;gap:10px;flex-wrap:wrap;justify-content:center;padding:10px 12px;border-radius:999px;background:rgba(4,19,16,.72);border:1px solid rgba(139,255,176,.18);backdrop-filter:blur(14px);box-shadow:0 12px 40px rgba(0,0,0,.28)}.topnav a{color:var(--text);text-decoration:none;padding:10px 14px;border-radius:999px;border:1px solid transparent;font-weight:700;font-size:.92rem}.topnav a:hover{background:rgba(139,255,176,.08);border-color:rgba(139,255,176,.16)}.topnav .brand{color:var(--neon)}.card{background:var(--panel);border:1px solid rgba(139,255,176,.22);box-shadow:0 0 0 1px rgba(70,245,197,.08),0 20px 70px rgba(0,0,0,.35);backdrop-filter:blur(12px);border-radius:28px}.content{padding:40px}.eyebrow{display:inline-block;padding:8px 14px;border-radius:999px;background:rgba(139,255,176,.1);color:var(--neon);border:1px solid rgba(139,255,176,.24);letter-spacing:.12em;text-transform:uppercase;font-size:.78rem;margin-bottom:18px}.game-shell{position:relative;min-height:72vh;overflow:hidden;border-radius:22px;border:1px solid rgba(139,255,176,.16);background:radial-gradient(circle at 50% 10%, rgba(255,255,255,.22), transparent 2px),radial-gradient(circle at 10% 20%, rgba(255,255,255,.20), transparent 1.8px),radial-gradient(circle at 30% 8%, rgba(255,255,255,.18), transparent 1.8px),radial-gradient(circle at 78% 14%, rgba(255,255,255,.24), transparent 2px),radial-gradient(circle at 62% 22%, rgba(70,245,197,.12), transparent 28%),linear-gradient(180deg,#03100e 0%,#0b2730 56%,#0d4c5b 56%,#07202a 100%)}.game-hud{position:absolute;inset:0;pointer-events:none;display:flex;justify-content:space-between;align-items:flex-start;padding:16px;color:#f3fff7;text-shadow:0 1px 2px rgba(0,0,0,.9)}.game-hud .score{background:rgba(0,0,0,.38);border:1px solid rgba(139,255,176,.16);border-radius:14px;padding:10px 12px;backdrop-filter:blur(8px)}#surfGameCanvas{width:100%;height:100%;display:block}.game-help{position:absolute;left:16px;bottom:16px;right:16px;background:rgba(0,0,0,.4);border:1px solid rgba(139,255,176,.14);border-radius:16px;padding:10px 12px;color:var(--muted);font-size:.92rem;backdrop-filter:blur(8px)}.mobile-controls{display:none;position:absolute;left:16px;right:16px;bottom:18px;gap:10px;pointer-events:auto;align-items:center;justify-content:space-between}.mobile-controls button{padding:16px 0;border-radius:18px;border:1px solid rgba(139,255,176,.22);background:rgba(0,0,0,.48);color:var(--text);font-weight:800;font-size:1rem;backdrop-filter:blur(10px)}.mobile-controls button:active{transform:scale(.98);background:rgba(139,255,176,.14)}.mobile-controls .row{display:flex;gap:10px}.mobile-controls .row.top button{min-width:92px}.pad-wrap{display:flex;justify-content:center;align-items:center;flex:1}.move-pad{width:168px;height:168px;border-radius:50%;border:1px solid rgba(139,255,176,.22);background:radial-gradient(circle at 50% 50%, rgba(139,255,176,.14), rgba(0,0,0,.55) 62%, rgba(0,0,0,.72) 100%);position:relative;touch-action:none;box-shadow:inset 0 0 0 1px rgba(255,255,255,.05),0 12px 30px rgba(0,0,0,.25)}.move-pad .knob{position:absolute;left:50%;top:50%;width:58px;height:58px;border-radius:50%;transform:translate(-50%,-50%);background:linear-gradient(135deg,#8bffb0,#46f5c5);box-shadow:0 0 22px rgba(70,245,197,.45)}@media (max-width: 768px){.mobile-controls{display:flex}.game-help{bottom:18px}.game-shell{min-height:78vh}.game-shell canvas{height:58vh;min-height:58vh}.game-hud .score:last-child{display:none}}@media (max-width: 768px){.mobile-controls{display:flex}.game-help{bottom:18px}.game-shell{min-height:78vh}.game-shell canvas{height:58vh;min-height:58vh}.game-hud .score:last-child{display:none}}
    .actions{display:flex;gap:12px;flex-wrap:wrap}.btn{display:inline-flex;align-items:center;justify-content:center;border-radius:14px;padding:14px 18px;text-decoration:none;font-weight:700;border:1px solid rgba(139,255,176,.24)}.btn.primary{background:linear-gradient(135deg,var(--neon),var(--neon-2));color:#02110d;box-shadow:0 12px 30px rgba(70,245,197,.18)}.btn.secondary{color:var(--text);background:rgba(255,255,255,.04)}
  </style>
</head>
<body>
  <nav class="topnav" aria-label="Menu principal">
    <a class="brand" href="index.html#top">Matrix na Praia</a>
    <a href="index.html#site">Site</a>
    <a href="index.html#mapa">Mapa</a>
    <a href="jogo.html">Jogo</a>
    <a href="index.html#receitas">Receitas</a>
  </nav>
  <main class="wrap">
    <section class="card content">
      <div class="eyebrow">Jogos</div>
      <h1 style="margin:0 0 10px;font-size:clamp(2.2rem,4vw,4rem);">Surf Matrix</h1>
      <p style="margin-bottom: 12px; color: var(--muted);">O jogo agora tem página própria. A home continua intacta, e esta página serve só pra surfar no neon.</p>
      <div class="actions"><a class="btn primary" href="index.html#site">Voltar ao site</a><a class="btn secondary" href="index.html#mapa">Abrir mapa</a></div>
    </section>
    <section class="card content" style="margin-top:24px;">
      <div class="game-shell">
        <canvas id="surfGameCanvas"></canvas>
        <div class="game-hud"><div class="score"><strong>Surf Matrix</strong><br><span id="gameScore">0</span> pontos</div><div class="score">Fase <span id="stageLabel">1/4</span><br>Use ← → / A D para mover<br>Espaço / toque = atirar</div></div>
        <div class="mobile-controls" aria-label="Controles móveis"><div class="row top"><button id="restartBtn" type="button">↻</button><button id="shootBtn" type="button">✦</button></div><div class="pad-wrap"><div id="movePad" class="move-pad" role="application" aria-label="Circulo movimentador"><span class="knob"></span></div></div></div><div class="game-help">Desvie dos glitches no mar.</div>
      </div>
    </section>
  </main>
  <script>
    const canvas = document.getElementById('surfGameCanvas');
    const scoreEl = document.getElementById('gameScore');
    const stageLabel = document.getElementById('stageLabel');
    const ctx = canvas.getContext('2d');
    let w = 0, h = 0, dpr = 1;
    let score = 0, running = true;
    let board = { x: 0, y: 0, vx: 0, vy: 0 };
    let moveX = 0, moveY = 0;
    let stage = 1;
    let gameSpeed = 1;
    const stars = [];
    const glitches = [];
    const shots = [];
    const particles = [];
    let aimDir = -1;
    let shootCooldown = 0;
    let audioCtx = null;
    let lastMoveDir = -1;
    const mobile = matchMedia('(max-width: 768px)').matches;
    const movePad = document.getElementById('movePad');
    const padKnob = movePad?.querySelector('.knob');
    const shootBtn = document.getElementById('shootBtn');
    const restartBtn = document.getElementById('restartBtn');
    function resize() {
      const r = canvas.getBoundingClientRect();
      dpr = Math.min(devicePixelRatio || 1, 2);
      w = Math.max(320, Math.floor(r.width * dpr));
      h = Math.max(360, Math.floor(r.height * dpr));
      canvas.width = w;
      canvas.height = h;
      canvas.style.width = '100%';
      canvas.style.height = mobile ? '58vh' : '60vh';
      board.y = h * 0.5;
    }
    function rand(min, max) { return Math.random() * (max - min) + min; }
    function beep(type) {
      try {
        audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        const now = audioCtx.currentTime;
        o.type = type === 'hit' ? 'triangle' : 'square';
        o.frequency.setValueAtTime(type === 'hit' ? 880 : 220, now);
        o.frequency.exponentialRampToValueAtTime(type === 'hit' ? 220 : 120, now + (type === 'hit' ? 0.12 : 0.08));
        g.gain.setValueAtTime(type === 'hit' ? 0.08 : 0.06, now);
        g.gain.exponentialRampToValueAtTime(0.0001, now + (type === 'hit' ? 0.14 : 0.09));
        o.start(now); o.stop(now + (type === 'hit' ? 0.15 : 0.1));
      } catch (e) {}
    }
    function updateStage() {
      stage = Math.min(4, 1 + Math.floor(score / 100));
      gameSpeed = 1 + (stage - 1) * 0.06;
    }
    function reset() {
      score = 0; running = true; board.x = w / 2; board.y = h / 2; board.vx = 0; board.vy = 0; moveX = 0; moveY = 0; shots.length = 0; shootCooldown = 0; stage = 1; gameSpeed = 1;
      stars.length = 0; glitches.length = 0; particles.length = 0;
      for (let i = 0; i < 26; i++) stars.push({ x: rand(0, w), y: rand(0, h * 0.34), r: rand(0.8, 2.2) * dpr, s: rand(0.15, 0.6) * dpr });
      for (let i = 0; i < 4; i++) glitches.push({ x: rand(40 * dpr, w - 40 * dpr), y: rand(-h, -20), s: rand(0.8, 1.4) * dpr, vy: rand(1.2, 2.4) * dpr, hp: 1, kind: 1 });
      for (let i = 0; i < 4; i++) glitches.push({ x: rand(40 * dpr, w - 40 * dpr), y: rand(-h, -20), s: rand(0.95, 1.25) * dpr, vy: rand(0.45, 0.85) * dpr, hp: 2, kind: 2 });
      for (let i = 0; i < 3; i++) glitches.push({ x: rand(40 * dpr, w - 40 * dpr), y: h + rand(20, 140) * dpr, s: rand(1.0, 1.45) * dpr, vy: -rand(1.4, 2.7) * dpr, hp: 3, kind: 3 });
      for (let i = 0; i < 3; i++) shots.push({ x: w / 2, y: h * 0.72, vx: 0, vy: -7.5 * dpr, alive: false, dir: -1 });
      scoreEl.textContent = score;
      stageLabel.textContent = stage + '/4';
    }
    function drawSky() {
      const g = ctx.createLinearGradient(0, 0, 0, h);
      g.addColorStop(0, '#07151f');
      g.addColorStop(0.35, '#0a2032');
      g.addColorStop(0.58, '#0b2730');
      g.addColorStop(1, '#07202a');
      ctx.fillStyle = g; ctx.fillRect(0, 0, w, h);
      ctx.fillStyle = stage === 4 ? 'rgba(255,220,255,.95)' : stage === 3 ? 'rgba(210,240,255,.95)' : stage === 2 ? 'rgba(220,220,255,.95)' : 'rgba(255,255,255,.92)';
      for (const s of stars) { ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill(); }
      const moonX = w * 0.82, moonY = h * 0.12;
      ctx.fillStyle = stage === 4 ? 'rgba(255,150,210,.92)' : 'rgba(255,245,190,.9)';
      ctx.beginPath(); ctx.arc(moonX, moonY, 26 * dpr, 0, Math.PI * 2); ctx.fill();
    }
    function drawSea() {
      const horizon = h * 0.56;
      const seaGrad = ctx.createLinearGradient(0, horizon, 0, h);
      const palettes = [
        ['#0c4b58', '#07222c'],
        ['#2f3f8f', '#101a42'],
        ['#5f2f8f', '#1d0e3f'],
        ['#8f2f4a', '#2a0e16'],
      ];
      const pal = palettes[stage - 1];
      seaGrad.addColorStop(0, pal[0]);
      seaGrad.addColorStop(1, pal[1]);
      ctx.fillStyle = seaGrad; ctx.fillRect(0, horizon, w, h - horizon);
      ctx.strokeStyle = 'rgba(70,245,197,.3)'; ctx.lineWidth = 2 * dpr;
      for (let i = 0; i < 6; i++) { const y = horizon + 22 * dpr + i * 18 * dpr; ctx.beginPath(); ctx.moveTo(0, y); ctx.quadraticCurveTo(w * 0.5, y - 8 * dpr, w, y); ctx.stroke(); }
    }
    function roundRect(c, x, y, w, h, r, fill) {
      c.beginPath();
      c.moveTo(x + r, y);
      c.arcTo(x + w, y, x + w, y + h, r);
      c.arcTo(x + w, y + h, x, y + h, r);
      c.arcTo(x, y + h, x, y, r);
      c.arcTo(x, y, x + w, y, r);
      if (fill) c.fill(); else c.stroke();
    }
    function burst(x, y, color) { for (let i = 0; i < 10; i++) particles.push({ x, y, vx: rand(-2, 2) * dpr, vy: rand(-2, 2) * dpr, life: 20, color }); }
    function drawBoard() {
      const x = board.x, y = board.y;
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(Math.sin(performance.now() / 220) * 0.05);
      ctx.fillStyle = stage === 4 ? '#1b0010' : stage === 3 ? '#14061d' : stage === 2 ? '#09151f' : '#02110d';
      ctx.shadowColor = 'rgba(70,245,197,.7)';
      ctx.shadowBlur = 16 * dpr;
      roundRect(ctx, -34 * dpr, -12 * dpr, 68 * dpr, 18 * dpr, 10 * dpr, true);
      ctx.fillStyle = stage === 4 ? '#ff7ad9' : stage === 3 ? '#7ad9ff' : stage === 2 ? '#b8a7ff' : '#8bffb0';
      ctx.fillRect(-6 * dpr, -6 * dpr, 12 * dpr, 12 * dpr);
      ctx.fillStyle = stage === 4 ? '#ffb0f0' : stage === 3 ? '#8be8ff' : stage === 2 ? '#d5c6ff' : '#46f5c5';
      ctx.beginPath(); ctx.arc(0, -18 * dpr, 8 * dpr, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    }
    function drawShots() {
      ctx.save();
      ctx.fillStyle = '#fff';
      ctx.shadowColor = 'rgba(255,255,255,.8)';
      ctx.shadowBlur = 10 * dpr;
      for (const s of shots) {
        if (!s.alive) continue;
        s.x += s.vx;
        s.y += s.vy;
        ctx.beginPath();
        ctx.arc(s.x, s.y, 4 * dpr, 0, Math.PI * 2);
        ctx.fill();
        if (s.y < -10 * dpr || s.y > h + 10 * dpr || s.x < -10 * dpr || s.x > w + 10 * dpr) s.alive = false;
      }
      ctx.restore();
    }
    function drawParticles() {
      ctx.save();
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy; p.life--;
        ctx.fillStyle = p.color;
        ctx.globalAlpha = Math.max(0, p.life / 20);
        ctx.beginPath(); ctx.arc(p.x, p.y, 3 * dpr, 0, Math.PI * 2); ctx.fill();
        if (p.life <= 0) particles.splice(i, 1);
      }
      ctx.globalAlpha = 1;
      ctx.restore();
    }
    function drawGlitches() {
      ctx.save();
      for (const g of glitches) {
        if (g.kind === 1) g.y += g.vy;
        if (g.kind === 2) { const dx = board.x - g.x; g.x += Math.sign(dx) * Math.min(Math.abs(dx) * 0.0025, 0.45 * dpr); g.y += g.vy; }
        if (g.kind === 3) g.y += g.vy;
        if ((g.kind !== 3 && g.y > h + 40 * dpr) || (g.kind === 3 && g.y < -40 * dpr)) {
          if (g.kind === 1) { g.y = rand(-h, -20); g.x = rand(40 * dpr, w - 40 * dpr); }
          if (g.kind === 2) { g.y = rand(-h, -20); g.x = rand(40 * dpr, w - 40 * dpr); }
          if (g.kind === 3) { g.y = h + rand(60, 120) * dpr; g.x = rand(40 * dpr, w - 40 * dpr); }
          g.hp = g.kind;
          score += 10; scoreEl.textContent = score; beep('hit'); updateStage();
        }
        const palette = g.kind === 1 ? ['#8bffb0', '#46f5c5'] : g.kind === 2 ? ['#ffd36b', '#ff8f5a'] : ['#87b7ff', '#d6f0ff'];
        ctx.fillStyle = palette[0];
        ctx.shadowColor = palette[1];
        ctx.shadowBlur = 12 * dpr;
        if (g.kind === 1) {
          ctx.beginPath(); ctx.arc(g.x, g.y, 11 * g.s, 0, Math.PI * 2); ctx.fill();
          ctx.strokeStyle = palette[1]; ctx.lineWidth = 3 * dpr; ctx.beginPath(); ctx.moveTo(g.x - 14 * g.s, g.y); ctx.lineTo(g.x + 14 * g.s, g.y); ctx.stroke();
        } else if (g.kind === 2) {
          ctx.save(); ctx.translate(g.x, g.y); ctx.rotate(performance.now() / 500); roundRect(ctx, -12 * g.s, -12 * g.s, 24 * g.s, 24 * g.s, 5 * dpr, true); ctx.restore();
        } else {
          ctx.save(); ctx.translate(g.x, g.y); ctx.rotate(performance.now() / 250); ctx.beginPath(); ctx.moveTo(0, -16 * g.s); ctx.lineTo(11 * g.s, 10 * g.s); ctx.lineTo(-11 * g.s, 10 * g.s); ctx.closePath(); ctx.fill(); ctx.restore();
        }
        const hitR = g.kind === 1 ? 18 : g.kind === 2 ? 22 : 20;
        for (const s of shots) {
          if (!s.alive) continue;
          const sx = Math.abs(g.x - s.x);
          const sy = Math.abs(g.y - s.y);
          if (sx < hitR * dpr && sy < hitR * dpr) {
            s.alive = false;
            g.hp -= 1;
            burst(g.x, g.y, palette[1]);
            score += 20;
            scoreEl.textContent = score;
            beep('hit');
            gameSpeed += 0.01;
            updateStage();
            if (g.hp <= 0) {
              burst(g.x, g.y, palette[0]);
              if (g.kind === 1) { g.y = h + 80 * dpr; g.x = rand(40 * dpr, w - 40 * dpr); }
              if (g.kind === 2) { g.y = rand(-h, -20); g.x = rand(40 * dpr, w - 40 * dpr); }
              if (g.kind === 3) { g.y = h + rand(60, 120) * dpr; g.x = rand(40 * dpr, w - 40 * dpr); }
              g.hp = g.kind;
            } else {
              g.x += rand(-18, 18) * dpr; g.y += rand(-12, 12) * dpr;
            }
          }
        }
        const dx = Math.abs(g.x - board.x);
        const dy = Math.abs(g.y - board.y);
        if (dx < 26 * dpr && dy < 22 * dpr) { running = false; beep('shoot'); }
      }
      ctx.restore();
    }
    function draw() {
      drawSky();
      drawSea();
      drawShots();
      drawParticles();
      drawGlitches();
      drawBoard();
      if (!running) {
        ctx.fillStyle = 'rgba(0,0,0,.45)'; ctx.fillRect(0, 0, w, h);
        ctx.fillStyle = '#fff'; ctx.font = (22 * dpr) + 'px system-ui'; ctx.textAlign = 'center';
        ctx.fillText('Caiu! Aperte R para reiniciar.', w / 2, h / 2);
      }
    }
    function tick() {
      if (shootCooldown > 0) shootCooldown--;
      if (running) {
        if (holdL) board.vx -= 0.55 * dpr;
        if (holdR) board.vx += 0.55 * dpr;
        if (holdU) board.vy -= 0.42 * dpr;
        if (holdD) board.vy += 0.42 * dpr;
        board.x += board.vx * gameSpeed;
        board.y += board.vy * gameSpeed;
        board.vx *= 0.92;
        board.vy *= 0.90;
        const pad = 28 * dpr;
        if (board.x < pad) board.x = pad;
        if (board.x > w - pad) board.x = w - pad;
        if (board.y < pad) board.y = pad;
        if (board.y > h - pad) board.y = h - pad;
      }
      draw();
      requestAnimationFrame(tick);
    }
    let holdL = false, holdR = false, holdU = false, holdD = false;
    const keys = new Set();
    const moveLeft = () => { if (running) board.vx -= 2.8 * dpr; };
    const moveRight = () => { if (running) board.vx += 2.8 * dpr; };
    const moveUp = () => { if (running) board.vy -= 2.4 * dpr; };
    const moveDown = () => { if (running) board.vy += 2.4 * dpr; };
    const startHold = (dir) => { if (dir === 'l') holdL = true; if (dir === 'r') holdR = true; };
    const stopHold = (dir) => { if (dir === 'l') holdL = false; if (dir === 'r') holdR = false; };
    const shoot = () => {
      if (!running || shootCooldown > 0) return;
      const speed = 7.5 * dpr;
      const x = board.x;
      const y = board.y;
      const dx = (holdR ? 1 : 0) + (holdL ? -1 : 0);
      const dy = (holdD ? 1 : 0) + (holdU ? -1 : 0);
      let vx = 0, vy = 0, sx = x, sy = y;
      if (dx !== 0 || dy !== 0) {
        const mag = Math.hypot(dx, dy) || 1;
        vx = (dx / mag) * speed;
        vy = (dy / mag) * speed;
        sx = x + (dx * 18 * dpr);
        sy = y + (dy * 18 * dpr);
      } else {
        const dir = lastMoveDir !== -1 ? lastMoveDir : aimDir;
        if (dir === 0) { vy = -speed; sy = y - 22 * dpr; }
        else if (dir === 1) { vy = speed; sy = y + 22 * dpr; }
        else if (dir === 2) { vx = speed; sx = x + 22 * dpr; }
        else if (dir === 3) { vx = -speed; sx = x - 22 * dpr; }
        else if (dir === 4) { vx = speed * 0.72; vy = -speed * 0.72; sx = x + 18 * dpr; sy = y - 18 * dpr; }
        else if (dir === 5) { vx = -speed * 0.72; vy = -speed * 0.72; sx = x - 18 * dpr; sy = y - 18 * dpr; }
        else if (dir === 6) { vx = speed * 0.72; vy = speed * 0.72; sx = x + 18 * dpr; sy = y + 18 * dpr; }
        else if (dir === 7) { vx = -speed * 0.72; vy = speed * 0.72; sx = x - 18 * dpr; sy = y + 18 * dpr; }
        else { vy = -speed; sy = y - 22 * dpr; }
      }
      shots.push({ x: sx, y: sy, vx, vy, alive: true, dir: dx && dy ? 'diag' : 'cardinal' });
      shootCooldown = 12;
      beep('shoot');
    };
    upBtn?.addEventListener('pointerdown', () => { startHold('u'); aimDir = 0; lastMoveDir = 0; moveUp(); });
    downBtn?.addEventListener('pointerdown', () => { startHold('d'); aimDir = 1; lastMoveDir = 1; moveDown(); });
    let padActive = false;
    let padPointerId = null;
    const updatePad = (evt) => {
      const r = movePad.getBoundingClientRect();
      const cx = r.left + r.width / 2;
      const cy = r.top + r.height / 2;
      const dx = evt.clientX - cx;
      const dy = evt.clientY - cy;
      const angle = Math.atan2(dy, dx);
      const dist = Math.min(Math.hypot(dx, dy), r.width * 0.28);
      const nx = Math.cos(angle) * dist;
      const ny = Math.sin(angle) * dist;
      padKnob.style.transform = `translate(calc(-50% + ${nx}px), calc(-50% + ${ny}px))`;
      const dead = r.width * 0.14;
      if (Math.hypot(dx, dy) < dead) return;
      if (Math.abs(dx) > Math.abs(dy)) {
        if (dx > 0) { holdR = true; holdL = false; holdU = false; holdD = false; aimDir = 2; lastMoveDir = 2; }
        else { holdL = true; holdR = false; holdU = false; holdD = false; aimDir = 3; lastMoveDir = 3; }
      } else {
        if (dy > 0) { holdD = true; holdU = false; holdL = false; holdR = false; aimDir = 1; lastMoveDir = 1; }
        else { holdU = true; holdD = false; holdL = false; holdR = false; aimDir = 0; lastMoveDir = 0; }
      }
    };
    const releasePad = () => {
      padActive = false; padPointerId = null; holdU = holdD = holdL = holdR = false;
      if (padKnob) padKnob.style.transform = 'translate(-50%, -50%)';
    };
    movePad?.addEventListener('pointerdown', (e) => { padActive = true; padPointerId = e.pointerId; movePad.setPointerCapture(e.pointerId); updatePad(e); });
    movePad?.addEventListener('pointermove', (e) => { if (!padActive || e.pointerId !== padPointerId) return; updatePad(e); });
    movePad?.addEventListener('pointerup', releasePad);
    movePad?.addEventListener('pointercancel', releasePad);
    movePad?.addEventListener('pointerleave', () => { if (padActive) releasePad(); });
    shootBtn?.addEventListener('pointerdown', shoot);
    restartBtn?.addEventListener('pointerdown', () => reset());
    window.addEventListener('keydown', (e) => {
      const k = e.key.toLowerCase();
      if (k === '1') { setAim(4); lastMoveDir = 4; }
      if (k === '2') { setAim(5); lastMoveDir = 5; }
      if (k === '3') { setAim(6); lastMoveDir = 6; }
      if (k === '4') { setAim(7); lastMoveDir = 7; }
    });
    const pad = document.createElement('div');
    pad.className = 'mobile-controls';
    const setAim = (dir) => { aimDir = dir; };
    window.addEventListener('keydown', (e) => {
      const k = e.key.toLowerCase();
      if (!running && k === 'r') { reset(); return; }
      if (k === ' ' || k === 'enter') { e.preventDefault(); shoot(); return; }
      if (['arrowup','w','arrowdown','s','arrowleft','a','arrowright','d'].includes(k)) e.preventDefault();
      if (keys.has(k)) return;
      keys.add(k);
      if (k === 'arrowup' || k === 'w') { holdU = true; moveUp(); setAim(0); lastMoveDir = 0; }
      if (k === 'arrowdown' || k === 's') { holdD = true; moveDown(); setAim(1); lastMoveDir = 1; }
      if (k === 'arrowright' || k === 'd') { holdR = true; moveRight(); setAim(2); lastMoveDir = 2; }
      if (k === 'arrowleft' || k === 'a') { holdL = true; moveLeft(); setAim(3); lastMoveDir = 3; }
    });
    window.addEventListener('keyup', (e) => {
      const k = e.key.toLowerCase();
      keys.delete(k);
      if (k === 'arrowup' || k === 'w') holdU = false;
      if (k === 'arrowdown' || k === 's') holdD = false;
      if (k === 'arrowright' || k === 'd') holdR = false;
      if (k === 'arrowleft' || k === 'a') holdL = false;
    });
    canvas.addEventListener('pointerdown', (e) => { if (e.button === 0) shoot(); });
    window.addEventListener('resize', () => { resize(); reset(); });
    resize(); reset(); tick();
  </script>
</body>
</html>
